name: foodhub
description: "FoodHub - Recipe search and meal planning app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.4

  # HTTP
  dio: ^5.8.0+1

  # Local Storage
  shared_preferences: ^2.5.3

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Localization
  intl: ^0.20.2

  # Shimmer loading effect
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  mockito: ^5.4.5

flutter:
  uses-material-design: true
  generate: true
